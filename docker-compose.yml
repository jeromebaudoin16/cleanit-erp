version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: cleanit_db
    environment:
      POSTGRES_DB: cleanit_erp
      POSTGRES_USER: cleanit
      POSTGRES_PASSWORD: cleanit2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanit -d cleanit_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cleanit_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cleanit.cm
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
